services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.opendataloader
    image: pdf-to-md:opendataloader-local
    ports:
      - "3300:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pdf_to_md
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ocr-workspace
      MINIO_USE_SSL: "false"
    depends_on:
      - postgres
      - minio
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdf_to_md
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - opendataloader_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - opendataloader_miniodata:/data

volumes:
  opendataloader_pgdata:
  opendataloader_miniodata:
